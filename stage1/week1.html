<script>

  // Hide overlay, show user badge
  document.getElementById('auth-overlay').classList.add('hidden');

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` };
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  el.className = '';
  if (state === 'syncing') { el.classList.add('syncing'); el.title = 'Saving…'; }
  else if (state === 'saved') {
    el.classList.add('saved'); el.title = 'Saved to cloud ✓';
    setTimeout(() => { el.className = ''; el.title = ''; }, 2500);
  }
}

  window.__accessToken = token;
  window.accessToken = token;
async function loadAnnotations() {
  try {
    setSyncStatus('syncing');
    const res = await fetch(`${API_URL}/progress?stage=stage1&week=week1`, { headers: authHeaders() });
    if (!res.ok) throw new Error('API error');
    const payload = await res.json();
    const remote = payload && payload.annotations ? payload.annotations : [];
    setSyncStatus('saved');

    // Clear current annotations before restoring
    annotations = [];
    remote.forEach(a => {
      annotations.push(a);
      if (a.type === 'highlight') restoreHighlight(a);
      if (a.type === 'note')      restoreNote(a);
      if (a.type === 'drawing')   restoreDrawing(a);
    });
    updateCount();
    return;
  } catch (e) {
    setSyncStatus('');
    showToast('Cloud unavailable (offline or API error).', 'warn');
  }
}

function saveAnnotations() {
  saveToLocalStorage();
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => syncAllToAPI(), 400);
  updateCount();
}

async function syncAllToAPI() {
  if (!accessToken) return;
  const payload = annotations.map(a => {
    if (a.type === 'note') {
      const el = document.getElementById('note-' + a.id);
      if (!el) return null;
      return { id:a.id, type:'note', week_id:WEEK_ID,
               x:el.style.left, y:el.style.top,
               text:el.querySelector('.ann-note-text').value, timestamp:a.timestamp };
    }
    if (a.type === 'highlight') {
      return { id:a.id, type:'highlight', week_id:WEEK_ID, color:a.color, text:a.text };
    }
    return null;
  }).filter(Boolean);

  // Include drawing strokes as a special record
  const data = {
    annotations: payload,
    drawing: drawStrokes && drawStrokes.length ? { week_id: WEEK_ID, strokes: drawStrokes } : null,
    updatedAt: Date.now()
  };

  setSyncStatus('syncing');
  try {
    const res = await fetch(`${API_URL}/progress`, {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage: 'stage1', week: 'week1', data })
    });
    if (!res.ok) throw new Error('API error ' + res.status);
    setSyncStatus('saved');
  } catch(e) { setSyncStatus(''); }
}

async function apiDelete(id) {
  if (!accessToken) return;
  try {
    await fetch(`${API_URL}/progress?id=${encodeURIComponent(id)}`, {
      method: 'DELETE', headers: authHeaders()
    });
  } catch(e) {}
}

async function apiClearAll() {
  if (!accessToken) return;
  try {
    await fetch(`${API_URL}/progress?week_id=${WEEK_ID}`, {
      method: 'DELETE', headers: authHeaders()
    });
  } catch(e) {}
}

function saveToLocalStorage() {
  const ANN_KEY = 'ann_' + WEEK_ID;
  const payload = annotations.map(a => {
    if (a.type === 'note') {
      const el = document.getElementById('note-' + a.id);
      if (!el) return null;
      return { id:a.id, type:'note', x:el.style.left, y:el.style.top,
               text:el.querySelector('.ann-note-text').value, timestamp:a.timestamp };
    }
    if (a.type === 'highlight') return { id:a.id, type:'highlight', color:a.color, text:a.text };
    return null;
  }).filter(Boolean);
  try {
    localStorage.setItem(ANN_KEY, JSON.stringify(payload));
    if (drawStrokes.length > 0) localStorage.setItem(ANN_KEY+'_strokes', JSON.stringify(drawStrokes));
    else localStorage.removeItem(ANN_KEY+'_strokes');
  } catch(e) {}
}

function loadFromLocalStorage() {
  const ANN_KEY = 'ann_' + WEEK_ID;
  try {
    const raw = localStorage.getItem(ANN_KEY);
    if (raw) JSON.parse(raw).forEach(a => {
      if (a.type === 'highlight') restoreHighlight(a);
      if (a.type === 'note')      restoreNote(a);
    });
    const savedStrokes = localStorage.getItem(ANN_KEY+'_strokes');
    if (savedStrokes) restoreDrawing({ strokes: JSON.parse(savedStrokes) });
  } catch(e) {}
  updateCount();
}

function restoreDrawing(a) {
  if (a.strokes && a.strokes.length > 0) {
    drawStrokes = a.strokes;
    redrawCanvas();
  }
}


/* ─────────────── MODE SWITCHING ─────────────── */

function setSyncStatus(state) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  el.className = '';
  if (state === 'syncing') { el.classList.add('syncing'); el.title = 'Saving…'; }
  else if (state === 'saved') {
    el.classList.add('saved'); el.title = 'Saved to cloud ✓';
    setTimeout(() => { el.className = ''; el.title = ''; }, 2500);
  }
}


/* ─────────────── MODE SWITCHING ─────────────── */
function setMode(mode) {
  const wasActive = currentMode === mode;
  currentMode = wasActive ? null : mode;

  // Update all button active states
  document.querySelectorAll('.ann-btn').forEach(b => b.classList.remove('active'));
  document.body.classList.remove('erase-mode', 'draw-mode');

  // Show/hide draw sub-controls
  const drawColors = document.getElementById('draw-colors');
  const drawSep    = document.getElementById('draw-sep-2');
  const undoBtn    = document.getElementById('btn-draw-undo');
  drawColors.classList.remove('show');
  if (drawSep) drawSep.style.display = 'none';

  if (currentMode) {
    const map = { yellow:'btn-hl-y', green:'btn-hl-g', red:'btn-hl-r',
                  note:'btn-note', draw:'btn-draw', erase:'btn-erase' };
    document.getElementById(map[currentMode])?.classList.add('active');
  }

  if (currentMode === 'erase') document.body.classList.add('erase-mode');

  if (currentMode === 'draw') {
    document.body.classList.add('draw-mode');
    const canvas = document.getElementById('draw-canvas');
    canvas.classList.add('active');
    drawColors.classList.add('show');
    if (drawSep) drawSep.style.display = '';
    undoBtn.classList.add('show');
    // Redraw existing strokes so they reappear when re-entering draw mode
    if (drawStrokes.length) redrawCanvas();
    showToast('✏️ Draw mode — use finger or S Pen');
  } else {
    document.getElementById('draw-canvas').classList.remove('active');
    undoBtn.classList.remove('show');
  }

  if (currentMode && currentMode !== 'draw') {
    const labels = { yellow:'🟡 Yellow highlight', green:'🟢 Green highlight',
                     red:'🔴 Red highlight', note:'📝 Tap anywhere to add note',
                     erase:'🗑 Tap annotation to erase' };
    showToast(labels[currentMode]);
  } else if (!currentMode) {
    // deactivated
  }
}

/* ─────────────── SELECTION POPUP (mouse + touch) ─────────────── */
function showSelectionPopupAt(clientX, clientY) {
  const popup = document.getElementById('ann-selection-popup');
  const pw = 140;
  let left = Math.min(clientX - pw / 2, window.innerWidth - pw - 8);
  left = Math.max(8, left);
  // clientY is viewport-relative — correct for position:fixed
  // clamp so it never goes behind topbar (52px)
  const top = Math.max(60, clientY - 44);
  popup.style.left = left + 'px';
  popup.style.top  = top + 'px';
  popup.classList.add('show');
}

function hideSelectionPopup() {
  document.getElementById('ann-selection-popup').classList.remove('show');
}

// MOUSE selection
document.addEventListener('mouseup', (e) => {
  if (e.target.closest('#ann-toolbar,.ann-note,#ann-selection-popup')) return;
  if (currentMode === 'draw' || currentMode === 'note') return;
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 2) { hideSelectionPopup(); return; }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    // rect.top is viewport-relative (clientY) — pass directly, no scrollY
    showSelectionPopupAt(rect.left + rect.width / 2, rect.top);
  }, 30);
});

// TOUCH selection — fires after finger lift
document.addEventListener('touchend', (e) => {
  if (e.target.closest('#ann-toolbar,.ann-note,#ann-selection-popup')) return;
  if (currentMode === 'draw' || currentMode === 'note') return;
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 2) return;
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    // rect.top is viewport-relative — pass directly, no scrollY
    showSelectionPopupAt(rect.left + rect.width / 2, rect.top);
  }, 200);
}, { passive: true });

document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#ann-selection-popup')) hideSelectionPopup();
});
document.addEventListener('touchstart', (e) => {
  if (!e.target.closest('#ann-selection-popup')) hideSelectionPopup();
}, { passive: true });

/* ─────────────── HIGHLIGHTING ─────────────── */
function highlightSelection(color) {
  hideSelectionPopup();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!range || range.collapsed) return;

  try {
    const text = sel.toString().trim();
    if (!text) return;
    const id   = 'hl_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const mark = createMarkEl(id, color);
    range.surroundContents(mark);
    sel.removeAllRanges();
    annotations.push({ id, type:'highlight', color, text });
    saveAnnotations();
    showToast('✓ ' + color.charAt(0).toUpperCase() + color.slice(1) + ' highlight added');
  } catch(err) {
    try {
      const text = sel.toString().trim();
      if (!text) return;
      const id   = 'hl_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      const frag = range.extractContents();
      const mark = createMarkEl(id, color);
      mark.appendChild(frag);
      range.insertNode(mark);
      sel.removeAllRanges();
      annotations.push({ id, type:'highlight', color, text });
      saveAnnotations();
      showToast('✓ ' + color.charAt(0).toUpperCase() + color.slice(1) + ' highlight added');
    } catch(e2) { showToast('⚠ Try selecting within one paragraph'); }
  }
}

function createMarkEl(id, color) {
  const mark = document.createElement('mark');
  mark.className = 'ann-hl';
  mark.dataset.id = id;
  mark.dataset.color = color;
  mark.addEventListener('click',  () => { if (currentMode === 'erase') removeHighlight(id); });
  mark.addEventListener('touchend', (e) => { if (currentMode === 'erase') { removeHighlight(id); e.preventDefault(); } });
  return mark;
}

function removeHighlight(id) {
  const el = document.querySelector('[data-id="' + id + '"]');
  if (!el) return;
  const p = el.parentNode;
  while (el.firstChild) p.insertBefore(el.firstChild, el);
  p.removeChild(el);
  annotations = annotations.filter(a => a.id !== id);
  apiDelete(id);
  saveToLocalStorage();
  showToast('Highlight removed');
}
function restoreHighlight(a) { annotations.push(a); }

/* ─────────────── NOTE MODE TAP ─────────────── */
// Handle tap/click anywhere in note mode
document.addEventListener('click', (e) => {
  if (currentMode !== 'note') return;
  if (e.target.closest('.ann-note,#ann-toolbar,#ann-selection-popup')) return;
  addNote(e.pageX - 10, e.pageY - 10);
});
document.addEventListener('touchend', (e) => {
  if (currentMode !== 'note') return;
  if (e.target.closest('.ann-note,#ann-toolbar,#ann-selection-popup')) return;
  const t = e.changedTouches[0];
  addNote(t.pageX - 10, t.pageY - 10);
  e.preventDefault();
}, { passive: false });

/* ─────────────── STICKY NOTES ─────────────── */
function addNoteAtSelection() {
  hideSelectionPopup();
  const sel = window.getSelection();
  let x = window.innerWidth / 2 - 110, y = window.scrollY + 200;
  if (sel && !sel.isCollapsed) {
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    x = rect.right + window.scrollX + 10;
    y = rect.top   + window.scrollY - 10;
  }
  sel && sel.removeAllRanges();
  addNote(x, y);
}

function addNote(x, y) {
  const id = 'note_' + Date.now();
  const ts = new Date().toLocaleString('en-CA', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  const el = buildNoteEl(id, x, y, '', ts);
  document.body.appendChild(el);
  makeDraggable(el);
  // Focus with slight delay on mobile
  setTimeout(() => el.querySelector('.ann-note-text').focus(), 100);
  annotations.push({ id, type:'note', timestamp: ts });
  saveAnnotations();
  updateCount();
  showToast('📝 Note added — tap to type');
}

function restoreNote(a) {
  const el = buildNoteEl(a.id, parseInt(a.x)||100, parseInt(a.y)||100, a.text||'', a.timestamp||'');
  document.body.appendChild(el);
  annotations.push(a);
  makeDraggable(el);
}

function buildNoteEl(id, x, y, text, timestamp) {
  const el = document.createElement('div');
  el.className  = 'ann-note';
  el.id         = 'note-' + id;
  el.style.left = Math.max(8, x) + 'px';
  el.style.top  = Math.max(60, y) + 'px';
  el.style.zIndex = noteZCounter++;
  el.innerHTML = `
    <div class="ann-note-header">
      <span class="ann-note-label">📝 Note</span>
      <button class="ann-note-close" onclick="removeNote('${id}')">✕</button>
    </div>
    <div class="ann-note-body">
      <textarea class="ann-note-text" placeholder="Type your note…" oninput="saveAnnotations()">${escapeHtml(text)}</textarea>
    </div>
    <div class="ann-note-footer">${timestamp}</div>`;
  return el;
}
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function removeNote(id) {
  document.getElementById('note-' + id)?.remove();
  annotations = annotations.filter(a => a.id !== id);
  apiDelete(id);
  saveToLocalStorage();
  updateCount();
}

/* ─────────────── DRAG NOTES (mouse + touch) ─────────────── */
function makeDraggable(el) {
  const header = el.querySelector('.ann-note-header');
  let ox=0, oy=0, sx=0, sy=0;

  const startDrag = (cx, cy) => {
    sx=cx; sy=cy; ox=el.offsetLeft; oy=el.offsetTop;
    el.style.zIndex = noteZCounter++;
  };
  const moveDrag = (cx, cy) => {
    el.style.left = Math.max(0, ox + cx - sx) + 'px';
    el.style.top  = Math.max(52, oy + cy - sy) + 'px';
  };

  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.ann-note-close')) return;
    e.preventDefault(); startDrag(e.clientX, e.clientY);
    const mm = (e) => moveDrag(e.clientX, e.clientY);
    const mu = () => { saveAnnotations(); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });

  header.addEventListener('touchstart', (e) => {
    if (e.target.closest('.ann-note-close')) return;
    const t = e.touches[0]; startDrag(t.clientX, t.clientY);
    const tm = (e) => { const t=e.touches[0]; moveDrag(t.clientX, t.clientY); };
    const te = () => { saveAnnotations(); document.removeEventListener('touchmove',tm); document.removeEventListener('touchend',te); };
    document.addEventListener('touchmove', tm, { passive:false });
    document.addEventListener('touchend', te);
  }, { passive:true });
}

/* ─────────────── CANVAS DRAWING (S Pen / finger / mouse) ─────────────── */
let drawColor = '#1a1a2e';
let drawSize  = 2;
let drawStrokes = [];   // stored in DOCUMENT coordinates (y includes scrollY)
let currentStroke = null;
let isDrawing = false;

function initCanvas() {
  const canvas = document.getElementById('draw-canvas');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  // Redraw on scroll so strokes appear anchored to document content
  window.addEventListener('scroll', () => { if (drawStrokes.length) redrawCanvas(); }, { passive: true });

  const ctx = canvas.getContext('2d');
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── S PEN OPTIMISED POINTER EVENTS ──────────────────────────
  // getBoundingClientRect gives pixel-perfect offset regardless of
  // topbar height, zoom level, or device DPI — no hard-coded magic numbers.

  function getPoint(e) {
    const rect = canvas.getBoundingClientRect();
    // Pixel-perfect coords relative to canvas top-left
    let cx = e.clientX - rect.left;
    let cy = e.clientY - rect.top;

    // S Pen tilt compensation (pen angle shifts perceived tip position)
    if (e.pointerType === 'pen' && (e.tiltX || e.tiltY)) {
      cx += Math.tan(e.tiltX * Math.PI / 180) * 2.4;
      cy += Math.tan(e.tiltY * Math.PI / 180) * 2.4;
    }

    return {
      // Document coords: add scrollY so strokes anchor to content not viewport
      x: cx,
      y: cy + window.scrollY
    };
  }

  // Convert stored document coord → canvas viewport coord for drawing
  function toViewport(pt) {
    return { x: pt.x, y: pt.y - window.scrollY };
  }

  function getPressureWidth(e) {
    if (e.pointerType === 'pen') {
      const p = e.pressure > 0 ? e.pressure : 0.5;
      return drawSize * (0.5 + Math.pow(p, 0.6) * 1.5);
    }
    return drawSize * 1.5;
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (!canvas.classList.contains('active')) return;
    e.preventDefault();
    isDrawing = true;
    const pt = getPoint(e);
    const vp = toViewport(pt);
    currentStroke = { color: drawColor, size: drawSize, type: e.pointerType, points: [pt] };
    ctx.beginPath();
    ctx.strokeStyle = drawColor;
    ctx.lineWidth   = getPressureWidth(e);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.moveTo(vp.x, vp.y);
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!isDrawing || !canvas.classList.contains('active')) return;
    e.preventDefault();
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ce of events) {
      const pt = getPoint(ce);
      const vp = toViewport(pt);
      currentStroke.points.push(pt);
      ctx.lineWidth   = getPressureWidth(ce);
      ctx.strokeStyle = drawColor;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.lineTo(vp.x, vp.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(vp.x, vp.y);
    }
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentStroke && currentStroke.points.length > 1) {
      drawStrokes.push(currentStroke);
      document.getElementById('btn-draw-undo').classList.add('show');
    }
    currentStroke = null;
    saveAnnotations();
  });

  canvas.addEventListener('pointercancel', () => { isDrawing = false; currentStroke = null; });
}

function resizeCanvas() {
  const canvas = document.getElementById('draw-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - 52;
  // Redraw all strokes at new size
  if (drawStrokes.length) redrawCanvas();
}

function onScroll() {
  // Handled inline above
}

function setDrawColor(color, btn) {
  drawColor = color;
  document.querySelectorAll('.draw-color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setDrawSize(size, btn) {
  drawSize = size;
  document.querySelectorAll('.draw-size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function undoStroke() {
  if (!drawStrokes.length) return;
  drawStrokes.pop();
  redrawCanvas();
  if (!drawStrokes.length) document.getElementById('btn-draw-undo').classList.remove('show');
  saveAnnotations();
}

function redrawCanvas() {
  const canvas = document.getElementById('draw-canvas');
  const ctx    = canvas.getContext('2d');
  const sy     = window.scrollY;   // single snapshot of scroll for this frame
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawStrokes.forEach(stroke => {
    if (stroke.points.length < 2) return;
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth   = stroke.size * 1.5;
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    // Document coords → viewport: subtract current scrollY
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y - sy);
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].x, stroke.points[i].y - sy);
    }
    ctx.stroke();
  });
}

/* ─────────────── ERASE MODE ─────────────── */
document.addEventListener('click', (e) => {
  if (currentMode !== 'erase') return;
  const hl = e.target.closest('.ann-hl');
  if (hl) { removeHighlight(hl.dataset.id); e.stopPropagation(); }
  const note = e.target.closest('.ann-note');
  if (note) removeNote(note.id.replace('note-',''));
}, true);
document.addEventListener('touchend', (e) => {
  if (currentMode !== 'erase') return;
  const hl = e.target.closest('.ann-hl');
  if (hl) { removeHighlight(hl.dataset.id); e.preventDefault(); }
  const note = e.target.closest('.ann-note');
  if (note) removeNote(note.id.replace('note-',''));
}, { passive: false, capture: true });

/* ─────────────── CLEAR ALL ─────────────── */
function clearAll() {
  if (!annotations.length && !drawStrokes.length) { showToast('Nothing to clear'); return; }
  if (!confirm('Remove ALL highlights, notes and drawings?')) return;
  document.querySelectorAll('.ann-hl').forEach(el => {
    const p = el.parentNode;
    while (el.firstChild) p.insertBefore(el.firstChild, el);
    p.removeChild(el);
  });
  document.querySelectorAll('.ann-note').forEach(el => el.remove());
  annotations = []; drawStrokes = [];
  const canvas = document.getElementById('draw-canvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  apiClearAll();
  try { localStorage.removeItem(ANN_KEY); localStorage.removeItem(ANN_KEY+'_canvas'); } catch(e){}
  updateCount();
  showToast('All annotations cleared');
}

/* ─────────────── UTILS ─────────────── */
function updateCount() {
  const n = annotations.length + drawStrokes.length;
  document.getElementById('ann-count').textContent = n + (n===1?' note':' notes');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('ann-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─────────────── INIT ─────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initCanvas();
  initAuth();  // Auth0 handles loadAnnotations after sign-in

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
      if (e.key === 'Escape') e.target.blur();
      return;
    }
    if (e.key === 'Escape') {
      currentMode = null;
      document.querySelectorAll('.ann-btn').forEach(b => b.classList.remove('active'));
      document.body.classList.remove('erase-mode','draw-mode');
      document.getElementById('draw-canvas').classList.remove('active');
      document.getElementById('draw-colors').classList.remove('show');
      hideSelectionPopup();
      return;
    }
    const map = { y:'yellow', g:'green', r:'red', n:'note', d:'draw', e:'erase' };
    if (map[e.key.toLowerCase()]) setMode(map[e.key.toLowerCase()]);
  });
});
</script>
